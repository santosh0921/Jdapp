name: jd_style_logistics
description: JD Style Logistics — Premium Multi-Role Logistics Platform
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Routing
  go_router: ^13.2.0

  # State Management
  provider: ^6.1.2

  # Network
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.2.1
  shared_preferences: ^2.3.1

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Animations
  lottie: ^3.1.2
  animate_do: ^3.3.2
  flutter_animate: ^4.5.0

  # Images
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  permission_handler: ^11.3.1

  google_maps_flutter: ^2.6.0
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_polyline_points: ^2.0.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/sounds/
